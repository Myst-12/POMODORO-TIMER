<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--header-->
    <header>
        <button id="linesBtn">|||</button>
        <h1 id="title">POMODORO</h1>
        <button id="settingsBtn">⚙️</button>
    </header>

        <!--pomodoro-->
        <div id="pomodoroContainer">
            <div id="modeContainer">
                <button id="workBtn">WORK</button>
                <button id="breakBtn">BREAK</button>
            </div>
            <h2 id="timer"></h2>
            <div id="btnContainer">
                <button id="startBtn">START</button>
                <button id="resetBtn">RESET</button>
            </div>
            <div id="chooseTimeContainer">
                <button id="option1Btn">25</button>
                <button id="option2Btn">50</button>
            </div>
            
        </div>
    
    <script src="script.js"></script>
</body>
</html>
